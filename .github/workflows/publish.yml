name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "Tag version:     $TAG"
          echo "pyproject.toml:  $PROJECT_VERSION"
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Run tests
        run: |
          uv sync --all-extras
          uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-atlas/
    permissions:
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
